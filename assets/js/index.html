<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 - Access Denied 💀</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top left, #7c3aed55, transparent 30%),
                radial-gradient(circle at bottom right, #06b6d455, transparent 30%),
                linear-gradient(135deg, #020617, #0f172a);
        }

        .card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 700px;
            text-align: center;
            padding: 3rem;
            border-radius: 24px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .status {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 800;
            background: linear-gradient(90deg, #22d3ee, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .emoji {
            font-size: 4rem;
            margin: 1rem 0;
            animation: float 2s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        .tag {
            display: inline-block;
            background: rgba(139,92,246,.15);
            border: 1px solid rgba(139,92,246,.4);
            color: #c4b5fd;
            padding: .6rem 1rem;
            border-radius: 999px;
            margin-bottom: 1.5rem;
            font-size: .9rem;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            border: none;
            cursor: pointer;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: .25s;
        }

        .back-btn {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }

        .back-btn:hover {
            transform: translateY(-3px);
        }

        .home-btn {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,.1);
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .footer {
            margin-top: 2rem;
            color: #94a3b8;
            font-size: .9rem;
        }

        @keyframes float {
            0%,100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #8b5cf655;
            filter: blur(100px);
            top: -100px;
            left: -100px;
        }

        .glow2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #06b6d455;
            filter: blur(100px);
            bottom: -100px;
            right: -100px;
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="glow2"></div>

<div class="card">

    <div class="status">503</div>

    <div class="emoji">💀</div>

    <div class="tag">
        Access Forbidden • Skill Issue Detected
    </div>

    <h1>Bro, you ain't supposed to be here 😭</h1>

    <p class="subtitle">
        The server looked at your request and said:
        <br>
        <strong>"Nah fam."</strong>
        <br><br>
        Either this page is restricted, unavailable,
        or the vibes are simply not matching right now.
    </p>

    <div class="buttons">
        <button class="back-btn" onclick="goBack()">
            ← Go Back
        </button>

        <button class="home-btn" onclick="goHome()">
            🏠 Home
        </button>
    </div>

    <div class="footer">
        Error 503 • Permission Not Found • Touch Grass and Try Again 🌱
    </div>

</div>

<script>
    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = "/";
        }
    }

    function goHome() {
        window.location.href = "/";
    }
</script>

</body>
</html>
